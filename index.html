<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Viz - Immersive Coding Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        #info h1 {
            font-size: 14px;
            font-weight: 600;
            color: #4A90D9;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        #info p {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        
        #connection-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #666;
        }
        
        #connection-status.connected {
            background: #6BCB77;
            box-shadow: 0 0 8px #6BCB77;
        }
        
        #connection-status.disconnected {
            background: #FF6B6B;
        }
        
        #agent-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-height: 400px;
            overflow-y: auto;
            min-width: 280px;
        }
        
        #agent-panel h2 {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .agent-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
        }
        
        .agent-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .agent-item.selected {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .agent-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 14px;
            flex-shrink: 0;
        }
        
        .agent-info {
            flex: 1;
        }
        
        .agent-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }
        
        .agent-role {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
            text-transform: capitalize;
        }
        
        .agent-type {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 10px;
        }
        
        .agent-type.permanent {
            background: rgba(74, 144, 217, 0.2);
            color: #4A90D9;
        }
        
        .agent-type.ephemeral {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
        }
        
        #thought-bubble {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(10, 10, 15, 0.92);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-width: 420px;
            display: none;
            min-height: 200px;
        }
        
        #thought-bubble.visible {
            display: block;
        }
        
        #thought-bubble .header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        #thought-bubble .header-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 12px;
        }
        
        #thought-bubble h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        #thought-bubble .role-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            margin-left: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        #thought-bubble .status {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        
        #thought-bubble .section {
            margin-bottom: 16px;
        }
        
        #thought-bubble .section-title {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        #thought-bubble .expertise-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        #thought-bubble .expertise-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            color: rgba(255,255,255,0.7);
        }
        
        #thought-bubble .current-task {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        
        #thought-bubble .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.5);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        #thought-bubble .close-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .control-btn:hover {
            background: rgba(74, 144, 217, 0.2);
            border-color: #4A90D9;
            color: #fff;
        }
        
        #message-input {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            background: rgba(10, 10, 15, 0.92);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            width: 400px;
        }
        
        #message-input.visible {
            display: block;
        }
        
        #message-input input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        #message-input input:focus {
            border-color: #4A90D9;
        }
        
        #message-input input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        #message-input .hint {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
            text-align: center;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="info">
        <h1>AGENT VIZ</h1>
        <span id="connection-status"></span>
        <span id="connection-text">Connecting...</span>
    </div>
    
    <div id="agent-panel">
        <h2>Active Agents</h2>
        <div id="agent-list"></div>
    </div>
    
    <div id="thought-bubble">
        <button class="close-btn" onclick="closeBubble()">×</button>
        <div class="header">
            <div class="header-dot" id="bubble-dot"></div>
            <div>
                <h3 id="bubble-title">Agent</h3>
                <div class="status" id="bubble-status">Idle</div>
            </div>
            <span class="role-badge" id="bubble-role">role</span>
        </div>
        
        <div class="section" id="expertise-section">
            <div class="section-title">Expertise</div>
            <div class="expertise-list" id="expertise-list"></div>
        </div>
        
        <div class="section">
            <div class="section-title">Current Task</div>
            <div class="current-task" id="bubble-task">No active task</div>
        </div>
    </div>
    
    <div id="message-input">
        <input type="text" id="msg-field" placeholder="Send a message to this agent...">
        <div class="hint">Press Enter to send, Escape to cancel</div>
    </div>
    
    <div id="controls">
        <button class="control-btn" onclick="resetCamera()">Reset View</button>
        <button class="control-btn" onclick="toggleRotation()">Auto-Rotate</button>
        <button class="control-btn" onclick="spawnEphemeral()">+ Worker</button>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ============ SCENE SETUP ============
        const container = document.getElementById('container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 15, 60);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 18);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        
        // ============ LIGHTING ============
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);
        
        // Colored accent lights
        const accentLight1 = new THREE.PointLight(0x9B59B6, 0.8, 25);
        accentLight1.position.set(-8, 4, 8);
        scene.add(accentLight1);
        
        const accentLight2 = new THREE.PointLight(0x27AE60, 0.6, 25);
        accentLight2.position.set(8, 4, -8);
        scene.add(accentLight2);
        
        // ============ GRID FLOOR ============
        const gridHelper = new THREE.GridHelper(50, 50, 0x222233, 0x111122);
        scene.add(gridHelper);
        
        // ============ AGENTS ============
        const agents = {};
        const agentGroups = {};
        let selectedAgentId = null;
        let autoRotate = true;
        
        // Shape geometries
        const geometries = {
            sphere: new THREE.SphereGeometry(0.6, 32, 32),
            octahedron: new THREE.OctahedronGeometry(0.6),
            icosahedron: new THREE.IcosahedronGeometry(0.6),
            tetrahedron: new THREE.TetrahedronGeometry(0.6),
            dodecahedron: new THREE.DodecahedronGeometry(0.6)
        };
        
        function createAgentMesh(agent) {
            const geometry = geometries[agent.shape] || geometries.sphere;
            
            const material = new THREE.MeshPhongMaterial({
                color: new THREE.Color(agent.color),
                emissive: new THREE.Color(agent.color),
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.95,
                shininess: 80
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            // Add glow ring at base
            const ringGeometry = new THREE.RingGeometry(0.7, 1.0, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color(agent.color),
                transparent: true,
                opacity: 0.25,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = -0.5;
            
            // Add a smaller inner ring
            const innerRingGeometry = new THREE.RingGeometry(0.4, 0.5, 32);
            const innerRing = new THREE.Mesh(innerRingGeometry, ringMaterial.clone());
            innerRing.rotation.x = -Math.PI / 2;
            innerRing.position.y = -0.49;
            
            const group = new THREE.Group();
            group.add(mesh);
            group.add(ring);
            group.add(innerRing);
            
            group.userData.floatOffset = Math.random() * Math.PI * 2;
            group.userData.baseY = 0;
            group.userData.mesh = mesh;
            group.userData.ring = ring;
            
            return group;
        }
        
        function addAgent(agentData) {
            if (agents[agentData.id]) return;
            
            agents[agentData.id] = agentData;
            const group = createAgentMesh(agentData);
            agentGroups[agentData.id] = group;
            
            // Arrange in a circle
            const agentList = Object.values(agents);
            const permanentCount = agentList.filter(a => a.agent_type === 'permanent').length;
            const count = agentList.length;
            
            // Sort so permanent agents are first
            const sorted = [...agentList].sort((a, b) => {
                if (a.agent_type !== b.agent_type) {
                    return a.agent_type === 'permanent' ? -1 : 1;
                }
                return 0;
            });
            
            const idx = sorted.findIndex(a => a.id === agentData.id);
            const angle = (idx - (count - 1) / 2) * (Math.PI * 2 / Math.max(count, 8));
            const radius = count > 5 ? 6 : 5;
            group.position.x = Math.cos(angle) * radius;
            group.position.z = Math.sin(angle) * radius;
            
            scene.add(group);
            updateAgentList();
        }
        
        function removeAgent(agentId) {
            const group = agentGroups[agentId];
            if (group) {
                scene.remove(group);
                delete agentGroups[agentId];
                delete agents[agentId];
            }
            updateAgentList();
        }
        
        function updateAgent(agentData) {
            agents[agentData.id] = agentData;
            
            const group = agentGroups[agentData.id];
            if (!group) {
                addAgent(agentData);
                return;
            }
            
            const mesh = group.userData.mesh;
            const baseColor = new THREE.Color(agentData.color);
            
            // Update visual state based on status
            switch(agentData.status) {
                case 'thinking':
                    mesh.material.emissiveIntensity = 0.5;
                    mesh.material.emissive = baseColor;
                    break;
                case 'working':
                    mesh.material.emissiveIntensity = 0.8;
                    mesh.material.emissive = baseColor;
                    break;
                case 'idle':
                    mesh.material.emissiveIntensity = 0.2;
                    mesh.material.emissive = baseColor;
                    break;
                case 'error':
                    mesh.material.emissive = new THREE.Color(0xFF6B6B);
                    mesh.material.emissiveIntensity = 1;
                    break;
                default:
                    mesh.material.emissiveIntensity = 0.2;
            }
            
            // Update thought bubble if selected
            if (selectedAgentId === agentData.id) {
                document.getElementById('bubble-status').textContent = agentData.status;
                document.getElementById('bubble-task').textContent = 
                    agentData.current_task || 'No active task';
            }
            
            updateAgentList();
        }
        
        function updateAgentList() {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            
            const agentList = Object.values(agents);
            
            // Sort: permanent first, then ephemeral
            agentList.sort((a, b) => {
                if (a.agent_type !== b.agent_type) {
                    return a.agent_type === 'permanent' ? -1 : 1;
                }
                return 0;
            });
            
            for (const agent of agentList) {
                const item = document.createElement('div');
                item.className = 'agent-item' + (selectedAgentId === agent.id ? ' selected' : '');
                item.onclick = () => selectAgent(agent);
                
                const typeClass = agent.agent_type === 'permanent' ? 'permanent' : 'ephemeral';
                const statusColor = agent.status === 'working' ? '#27AE60' : 
                                   agent.status === 'thinking' ? '#F39C12' : 
                                   agent.status === 'error' ? '#E74C3C' : 'rgba(255,255,255,0.4)';
                
                item.innerHTML = `
                    <div class="agent-dot" style="background: ${agent.color}; box-shadow: 0 0 10px ${agent.color}"></div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role" style="color: ${statusColor}">${agent.role} · ${agent.status}</div>
                    </div>
                    <span class="agent-type ${typeClass}">${typeClass}</span>
                `;
                
                list.appendChild(item);
            }
        }
        
        function selectAgent(agent) {
            selectedAgentId = agent.id;
            
            const bubble = document.getElementById('thought-bubble');
            bubble.classList.add('visible');
            
            document.getElementById('bubble-dot').style.background = agent.color;
            document.getElementById('bubble-dot').style.boxShadow = `0 0 10px ${agent.color}`;
            document.getElementById('bubble-title').textContent = agent.name;
            document.getElementById('bubble-status').textContent = agent.status;
            
            const roleBadge = document.getElementById('bubble-role');
            roleBadge.textContent = agent.role.replace('_', ' ');
            roleBadge.style.background = agent.color + '33';
            roleBadge.style.color = agent.color;
            
            // Show expertise if available
            const expertiseSection = document.getElementById('expertise-section');
            const expertiseList = document.getElementById('expertise-list');
            if (agent.expertise && agent.expertise.length > 0) {
                expertiseSection.style.display = 'block';
                expertiseList.innerHTML = agent.expertise.map(e => 
                    `<span class="expertise-tag">${e.replace('_', ' ')}</span>`
                ).join('');
            } else {
                expertiseSection.style.display = 'none';
            }
            
            document.getElementById('bubble-task').textContent = 
                agent.current_task || 'No active task — click to send a message';
            
            // Focus camera on agent
            const group = agentGroups[agent.id];
            if (group) {
                const targetPos = group.position.clone();
                targetPos.y = 2;
                controls.target.copy(targetPos);
            }
            
            updateAgentList();
        }
        
        window.closeBubble = function() {
            const bubble = document.getElementById('thought-bubble');
            bubble.classList.remove('visible');
            selectedAgentId = null;
            updateAgentList();
        };
        
        window.resetCamera = function() {
            camera.position.set(0, 8, 18);
            controls.target.set(0, 0, 0);
        };
        
        window.toggleRotation = function() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
        };
        
        window.spawnEphemeral = function() {
            const id = 'ephem-' + Date.now();
            const colors = ['#FF8C42', '#FFD93D', '#6BCB77'];
            const roles = ['file-ops', 'web-search', 'data-analysis'];
            const shapes = ['dodecahedron', 'tetrahedron', 'icosahedron'];
            
            const idx = Math.floor(Math.random() * 3);
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'command',
                    command: 'spawn',
                    target: null,
                    payload: {
                        id: id,
                        name: 'Worker-' + Math.floor(Math.random() * 100),
                        role: roles[idx],
                        color: colors[idx],
                        shape: shapes[idx],
                        agent_type: 'ephemeral'
                    }
                }));
            }
        };
        
        // ============ WEBSOCKET CONNECTION ============
        let ws;
        
        function connect() {
            const status = document.getElementById('connection-status');
            const text = document.getElementById('connection-text');
            
            try {
                ws = new WebSocket('ws://localhost:8765');
                
                ws.onopen = () => {
                    status.className = 'connected';
                    text.textContent = 'Connected';
                    console.log('Connected to Bridge API');
                };
                
                ws.onclose = () => {
                    status.className = 'disconnected';
                    text.textContent = 'Disconnected - Reconnecting...';
                    console.log('Disconnected, retrying in 2s...');
                    setTimeout(connect, 2000);
                };
                
                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                };
                
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                };
                
            } catch (e) {
                console.error('Connection error:', e);
                setTimeout(connect, 2000);
            }
        }
        
        function handleMessage(msg) {
            if (msg.type === 'init') {
                for (const agentData of msg.data.agents) {
                    addAgent(agentData);
                }
            } else if (msg.type === 'agent_event') {
                const event = msg.data;
                
                if (event.event_type === 'agent_spawned') {
                    addAgent(event.agent);
                } else if (event.event_type === 'agent_updated') {
                    updateAgent(event.agent);
                } else if (event.event_type === 'agent_complete') {
                    updateAgent(event.agent);
                    // Remove ephemeral after a delay
                    if (event.agent.agent_type === 'ephemeral') {
                        setTimeout(() => removeAgent(event.agent.id), 5000);
                    }
                } else if (event.event_type === 'agent_error') {
                    updateAgent(event.agent);
                }
            }
        }
        
        // ============ MESSAGE INPUT ============
        const msgInput = document.getElementById('message-input');
        const msgField = document.getElementById('msg-field');
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                msgInput.classList.remove('visible');
                msgField.value = '';
            }
        });
        
        msgField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && selectedAgentId) {
                const message = msgField.value.trim();
                if (message && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'message',
                        target: selectedAgentId,
                        message: message
                    }));
                    msgField.value = '';
                    msgInput.classList.remove('visible');
                }
            }
        });
        
        // Click on task area to send message
        document.getElementById('bubble-task').addEventListener('click', () => {
            if (selectedAgentId) {
                msgInput.classList.add('visible');
                msgField.focus();
            }
        });
        
        // ============ ANIMATION LOOP ============
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();
            
            // Animate all agent groups
            for (const id in agentGroups) {
                const group = agentGroups[id];
                const offset = group.userData.floatOffset;
                const mesh = group.userData.mesh;
                
                // Floating animation
                group.position.y = Math.sin(elapsed * 1.2 + offset) * 0.2;
                
                // Gentle rotation
                group.rotation.y = elapsed * 0.2 + offset;
                
                // Pulse emissive based on status
                const agent = agents[id];
                if (agent && agent.status === 'working') {
                    mesh.material.emissiveIntensity = 0.6 + Math.sin(elapsed * 4) * 0.2;
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ============ RESIZE HANDLER ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ============ START ============
        connect();
        
        // Fallback demo if bridge isn't running
        setTimeout(() => {
            if (Object.keys(agents).length === 0) {
                console.log('Bridge not available, adding demo agents');
                const demoAgents = [
                    { id: 'bit', name: 'Bit', role: 'assistant', agent_type: 'permanent', color: '#4A90D9', shape: 'sphere', status: 'idle', expertise: ['coding', 'general'] },
                    { id: 'architect', name: 'Architect', role: 'system_design', agent_type: 'permanent', color: '#9B59B6', shape: 'octahedron', status: 'idle', expertise: ['system_design', 'api_design', 'data_modeling'] },
                    { id: 'ops', name: 'Ops', role: 'operations_reliability', agent_type: 'permanent', color: '#27AE60', shape: 'dodecahedron', status: 'idle', expertise: ['ci_cd', 'kubernetes', 'monitoring'] },
                    { id: 'testing', name: 'Testing', role: 'quality_assurance', agent_type: 'permanent', color: '#E67E22', shape: 'icosahedron', status: 'idle', expertise: ['test_automation', 'unit_testing', 'e2e_testing'] },
                    { id: 'security', name: 'Security', role: 'security_review', agent_type: 'permanent', color: '#E74C3C', shape: 'tetrahedron', status: 'idle', expertise: ['vulnerability_analysis', 'auth', 'secure_coding'] }
                ];
                for (const agent of demoAgents) {
                    addAgent(agent);
                }
            }
        }, 3000);
    </script>
</body>
</html>
