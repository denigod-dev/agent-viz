<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Viz - Immersive Coding Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        #info h1 {
            font-size: 14px;
            font-weight: 600;
            color: #4A90D9;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        #info p {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        
        #connection-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #666;
        }
        
        #connection-status.connected {
            background: #6BCB77;
            box-shadow: 0 0 8px #6BCB77;
        }
        
        #connection-status.disconnected {
            background: #FF6B6B;
        }
        
        #agent-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-height: 400px;
            overflow-y: auto;
            min-width: 280px;
        }
        
        #agent-panel h2 {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .agent-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
        }
        
        .agent-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .agent-item.selected {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .agent-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 14px;
            flex-shrink: 0;
        }
        
        .agent-info {
            flex: 1;
        }
        
        .agent-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }
        
        .agent-role {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
            text-transform: capitalize;
        }
        
        .agent-type {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 10px;
        }
        
        .agent-type.permanent {
            background: rgba(74, 144, 217, 0.2);
            color: #4A90D9;
        }
        
        .agent-type.ephemeral {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
        }
        
        #thought-bubble {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(10, 10, 15, 0.92);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-width: 420px;
            display: none;
            min-height: 200px;
        }
        
        #thought-bubble.visible {
            display: block;
        }
        
        #thought-bubble .header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        #thought-bubble .header-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 12px;
        }
        
        #thought-bubble h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        #thought-bubble .role-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            margin-left: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        #thought-bubble .status {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        
        #thought-bubble .section {
            margin-bottom: 16px;
        }
        
        #thought-bubble .section-title {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        #thought-bubble .expertise-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        #thought-bubble .expertise-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            color: rgba(255,255,255,0.7);
        }
        
        #thought-bubble .current-task {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        
        #thought-bubble .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.5);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        #thought-bubble .close-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .control-btn:hover {
            background: rgba(74, 144, 217, 0.2);
            border-color: #4A90D9;
            color: #fff;
        }
        
        #message-input {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            background: rgba(10, 10, 15, 0.92);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            width: 400px;
        }
        
        #message-input.visible {
            display: block;
        }
        
        #message-input input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        #message-input input:focus {
            border-color: #4A90D9;
        }
        
        #message-input input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        #message-input .hint {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
            text-align: center;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="info">
        <h1>AGENT VIZ</h1>
        <span id="connection-status"></span>
        <span id="connection-text">Connecting...</span>
    </div>
    
    <div id="agent-panel">
        <h2>Active Agents</h2>
        <div id="agent-list"></div>
    </div>
    
    <div id="thought-bubble">
        <button class="close-btn" onclick="closeBubble()">×</button>
        <div class="header">
            <div class="header-dot" id="bubble-dot"></div>
            <div>
                <h3 id="bubble-title">Agent</h3>
                <div class="status" id="bubble-status">Idle</div>
            </div>
            <span class="role-badge" id="bubble-role">role</span>
        </div>
        
        <div class="section" id="expertise-section">
            <div class="section-title">Expertise</div>
            <div class="expertise-list" id="expertise-list"></div>
        </div>
        
        <div class="section">
            <div class="section-title">Current Task</div>
            <div class="current-task" id="bubble-task">No active task</div>
        </div>
    </div>
    
    <div id="message-input">
        <input type="text" id="msg-field" placeholder="Send a message to this agent...">
        <div class="hint">Press Enter to send, Escape to cancel</div>
    </div>
    
    <div id="controls">
        <button class="control-btn" onclick="resetCamera()">Reset View</button>
        <button class="control-btn" onclick="toggleRotation()">Auto-Rotate</button>
        <button class="control-btn" onclick="spawnEphemeral()">+ Worker</button>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        
        // ============ SCENE SETUP ============
        const container = document.getElementById('container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 20, 80);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 25);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.target.set(0, 4, 0);
        
        // ============ LIGHTING ============
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);
        
        // Accent lights per agent color
        const accentLights = {};
        
        // ============ GRID FLOOR ============
        const gridHelper = new THREE.GridHelper(60, 60, 0x222233, 0x111122);
        scene.add(gridHelper);
        
        // Platform circles
        function createPlatform(x, z, color) {
            const geometry = new THREE.CylinderGeometry(1.5, 1.8, 0.2, 32);
            const material = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.1,
                transparent: true,
                opacity: 0.3
            });
            const platform = new THREE.Mesh(geometry, material);
            platform.position.set(x, 0.1, z);
            scene.add(platform);
            
            // Glow ring
            const ringGeometry = new THREE.RingGeometry(1.6, 2.0, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.2,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(x, 0.15, z);
            scene.add(ring);
        }
        
        // ============ AGENT CREATION ============
        const agents = {};
        const agentGroups = {};
        let selectedAgentId = null;
        let autoRotate = true;
        
        function createAgent(agentData) {
            const group = new THREE.Group();
            const color = new THREE.Color(agentData.color);
            
            // === BODY (torso) ===
            const bodyGeometry = new THREE.BoxGeometry(0.8, 1.2, 0.5);
            const bodyMaterial = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.15
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 3.0;
            group.add(body);
            
            // === HEAD (cube with terminal screen) ===
            const headGroup = new THREE.Group();
            headGroup.position.y = 4.2;
            
            // Main cube head
            const headGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const headMaterial = new THREE.MeshPhongMaterial({
                color: 0x333333,
                emissive: color,
                emissiveIntensity: 0.3
            });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            headGroup.add(head);
            
            // Terminal screen on front of head
            const screenGeometry = new THREE.PlaneGeometry(0.6, 0.5);
            const screenMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.8
            });
            const screen = new THREE.Mesh(screenGeometry, screenMaterial);
            screen.position.z = 0.41;
            screen.position.y = -0.05;
            headGroup.add(screen);
            
            // Screen glow
            const glowGeometry = new THREE.PlaneGeometry(0.65, 0.55);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.2
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            glow.position.z = 0.42;
            glow.position.y = -0.05;
            headGroup.add(glow);
            
            // Scanlines effect (simple grid on screen)
            const scanlineGeometry = new THREE.PlaneGeometry(0.58, 0.02);
            const scanlineMaterial = new THREE.MeshBasicMaterial({ color: 0x003300 });
            for (let i = 0; i < 8; i++) {
                const scanline = new THREE.Mesh(scanlineGeometry, scanlineMaterial);
                scanline.position.z = 0.415;
                scanline.position.y = 0.15 - (i * 0.08);
                headGroup.add(scanline);
            }
            
            group.add(headGroup);
            
            // === ARMS ===
            const armGeometry = new THREE.BoxGeometry(0.2, 0.8, 0.2);
            const armMaterial = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.1
            });
            
            // Left arm
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-0.6, 3.2, 0);
            leftArm.rotation.z = 0.2;
            group.add(leftArm);
            
            // Right arm
            const rightArm = new THREE.Mesh(armGeometry, armMaterial.clone());
            rightArm.position.set(0.6, 3.2, 0);
            rightArm.rotation.z = -0.2;
            group.add(rightArm);
            
            // === LEGS ===
            const legGeometry = new THREE.BoxGeometry(0.25, 1.0, 0.25);
            const legMaterial = new THREE.MeshPhongMaterial({
                color: 0x222222
            });
            
            // Left leg
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.22, 1.7, 0);
            group.add(leftLeg);
            
            // Right leg
            const rightLeg = new THREE.Mesh(legGeometry, legMaterial.clone());
            rightLeg.position.set(0.22, 1.7, 0);
            group.add(rightLeg);
            
            // === FEET ===
            const footGeometry = new THREE.BoxGeometry(0.3, 0.15, 0.4);
            const footMaterial = new THREE.MeshPhongMaterial({ color: 0x111111 });
            
            const leftFoot = new THREE.Mesh(footGeometry, footMaterial);
            leftFoot.position.set(-0.22, 1.07, 0.05);
            group.add(leftFoot);
            
            const rightFoot = new THREE.Mesh(footGeometry, footMaterial.clone());
            rightFoot.position.set(0.22, 1.07, 0.05);
            group.add(rightFoot);
            
            // Store references for animation
            group.userData = {
                body: body,
                head: headGroup,
                leftArm: leftArm,
                rightArm: rightArm,
                leftLeg: leftLeg,
                rightLeg: rightLeg,
                screen: screen,
                glow: glow,
                color: color,
                baseY: 0,
                floatOffset: Math.random() * Math.PI * 2,
                walkOffset: Math.random() * Math.PI * 2
            };
            
            return group;
        }
        
        function addAgent(agentData) {
            if (agents[agentData.id]) return;
            
            agents[agentData.id] = agentData;
            const group = createAgent(agentData);
            agentGroups[agentData.id] = group;
            
            // Position agents in a circle
            const agentList = Object.values(agents);
            const count = agentList.length;
            const idx = agentList.findIndex(a => a.id === agentData.id);
            
            // Sort: permanent first
            const sorted = [...agentList].sort((a, b) => {
                if (a.agent_type !== b.agent_type) {
                    return a.agent_type === 'permanent' ? -1 : 1;
                }
                return 0;
            });
            const sortedIdx = sorted.findIndex(a => a.id === agentData.id);
            
            const radius = count > 6 ? 10 : 8;
            const angle = (sortedIdx - (sorted.length - 1) / 2) * (Math.PI * 2 / Math.max(sorted.length, 6));
            group.position.x = Math.cos(angle) * radius;
            group.position.z = Math.sin(angle) * radius;
            
            // Face center
            group.rotation.y = Math.atan2(group.position.x, group.position.z) + Math.PI;
            
            // Create platform
            createPlatform(group.position.x, group.position.z, agentData.color);
            
            scene.add(group);
            
            // Add accent light for this agent
            if (!accentLights[agentData.id]) {
                const light = new THREE.PointLight(agentData.color, 0.5, 8);
                light.position.set(group.position.x, 4, group.position.z);
                scene.add(light);
                accentLights[agentData.id] = light;
            }
            
            updateAgentList();
        }
        
        function removeAgent(agentId) {
            const group = agentGroups[agentId];
            if (group) {
                scene.remove(group);
                delete agentGroups[agentId];
                delete agents[agentId];
                if (accentLights[agentId]) {
                    scene.remove(accentLights[agentId]);
                    delete accentLights[agentId];
                }
            }
            updateAgentList();
        }
        
        function updateAgent(agentData) {
            agents[agentData.id] = agentData;
            
            const group = agentGroups[agentData.id];
            if (!group) {
                addAgent(agentData);
                return;
            }
            
            const userData = group.userData;
            const baseColor = new THREE.Color(agentData.color);
            
            // Update body glow based on status
            switch(agentData.status) {
                case 'thinking':
                    userData.body.material.emissiveIntensity = 0.4;
                    userData.screen.material.color.setHex(0xffff00);
                    userData.glow.material.color.setHex(0xffff00);
                    break;
                case 'working':
                    userData.body.material.emissiveIntensity = 0.6;
                    userData.screen.material.color.setHex(0x00ffff);
                    userData.glow.material.color.setHex(0x00ffff);
                    break;
                case 'error':
                    userData.body.material.emissiveIntensity = 0.8;
                    userData.body.material.emissive.setHex(0xff0000);
                    userData.screen.material.color.setHex(0xff0000);
                    userData.glow.material.color.setHex(0xff0000);
                    break;
                default:
                    userData.body.material.emissiveIntensity = 0.15;
                    userData.body.material.emissive = baseColor;
                    userData.screen.material.color.setHex(0x00ff00);
                    userData.glow.material.color.setHex(0x00ff00);
            }
            
            // Update thought bubble if selected
            if (selectedAgentId === agentData.id) {
                document.getElementById('bubble-status').textContent = agentData.status;
                document.getElementById('bubble-task').textContent = 
                    agentData.current_task || 'No active task';
            }
            
            updateAgentList();
        }
        
        function updateAgentList() {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            
            const agentList = Object.values(agents);
            
            // Sort: permanent first, then ephemeral
            agentList.sort((a, b) => {
                if (a.agent_type !== b.agent_type) {
                    return a.agent_type === 'permanent' ? -1 : 1;
                }
                return 0;
            });
            
            for (const agent of agentList) {
                const item = document.createElement('div');
                item.className = 'agent-item' + (selectedAgentId === agent.id ? ' selected' : '');
                item.onclick = () => selectAgent(agent);
                
                const typeClass = agent.agent_type === 'permanent' ? 'permanent' : 'ephemeral';
                const statusColor = agent.status === 'working' ? '#27AE60' : 
                                   agent.status === 'thinking' ? '#F39C12' : 
                                   agent.status === 'error' ? '#E74C3C' : 'rgba(255,255,255,0.4)';
                
                item.innerHTML = `
                    <div class="agent-dot" style="background: ${agent.color}; box-shadow: 0 0 10px ${agent.color}"></div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role" style="color: ${statusColor}">${agent.role} · ${agent.status}</div>
                    </div>
                    <span class="agent-type ${typeClass}">${typeClass}</span>
                `;
                
                list.appendChild(item);
            }
        }
        
        function selectAgent(agent) {
            selectedAgentId = agent.id;
            
            const bubble = document.getElementById('thought-bubble');
            bubble.classList.add('visible');
            
            document.getElementById('bubble-dot').style.background = agent.color;
            document.getElementById('bubble-dot').style.boxShadow = `0 0 10px ${agent.color}`;
            document.getElementById('bubble-title').textContent = agent.name;
            document.getElementById('bubble-status').textContent = agent.status;
            
            const roleBadge = document.getElementById('bubble-role');
            roleBadge.textContent = agent.role.replace('_', ' ');
            roleBadge.style.background = agent.color + '33';
            roleBadge.style.color = agent.color;
            
            // Show expertise if available
            const expertiseSection = document.getElementById('expertise-section');
            const expertiseList = document.getElementById('expertise-list');
            if (agent.expertise && agent.expertise.length > 0) {
                expertiseSection.style.display = 'block';
                expertiseList.innerHTML = agent.expertise.map(e => 
                    `<span class="expertise-tag">${e.replace('_', ' ')}</span>`
                ).join('');
            } else {
                expertiseSection.style.display = 'none';
            }
            
            document.getElementById('bubble-task').textContent = 
                agent.current_task || 'No active task — click to send a message';
            
            // Focus camera on agent
            const group = agentGroups[agent.id];
            if (group) {
                const targetPos = group.position.clone();
                targetPos.y = 4;
                controls.target.copy(targetPos);
            }
            
            updateAgentList();
        }
        
        window.closeBubble = function() {
            const bubble = document.getElementById('thought-bubble');
            bubble.classList.remove('visible');
            selectedAgentId = null;
            updateAgentList();
        };
        
        window.resetCamera = function() {
            camera.position.set(0, 10, 25);
            controls.target.set(0, 4, 0);
        };
        
        window.toggleRotation = function() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
        };
        
        window.spawnEphemeral = function() {
            const id = 'ephem-' + Date.now();
            const colors = ['#FF8C42', '#FFD93D', '#6BCB77'];
            const roles = ['file-ops', 'web-search', 'data-analysis'];
            
            const idx = Math.floor(Math.random() * 3);
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'command',
                    command: 'spawn',
                    target: null,
                    payload: {
                        id: id,
                        name: 'Worker-' + Math.floor(Math.random() * 100),
                        role: roles[idx],
                        color: colors[idx],
                        agent_type: 'ephemeral'
                    }
                }));
            }
        };
        
        // ============ WEBSOCKET CONNECTION ============
        let ws;
        
        function connect() {
            const status = document.getElementById('connection-status');
            const text = document.getElementById('connection-text');
            
            try {
                ws = new WebSocket('ws://localhost:8765');
                
                ws.onopen = () => {
                    status.className = 'connected';
                    text.textContent = 'Connected';
                    console.log('Connected to Bridge API');
                };
                
                ws.onclose = () => {
                    status.className = 'disconnected';
                    text.textContent = 'Disconnected - Reconnecting...';
                    console.log('Disconnected, retrying in 2s...');
                    setTimeout(connect, 2000);
                };
                
                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                };
                
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                };
                
            } catch (e) {
                console.error('Connection error:', e);
                setTimeout(connect, 2000);
            }
        }
        
        function handleMessage(msg) {
            if (msg.type === 'init') {
                for (const agentData of msg.data.agents) {
                    addAgent(agentData);
                }
            } else if (msg.type === 'agent_event') {
                const event = msg.data;
                
                if (event.event_type === 'agent_spawned') {
                    addAgent(event.agent);
                } else if (event.event_type === 'agent_updated') {
                    updateAgent(event.agent);
                } else if (event.event_type === 'agent_complete') {
                    updateAgent(event.agent);
                    if (event.agent.agent_type === 'ephemeral') {
                        setTimeout(() => removeAgent(event.agent.id), 5000);
                    }
                } else if (event.event_type === 'agent_error') {
                    updateAgent(event.agent);
                }
            }
        }
        
        // ============ MESSAGE INPUT ============
        const msgInput = document.getElementById('message-input');
        const msgField = document.getElementById('msg-field');
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                msgInput.classList.remove('visible');
                msgField.value = '';
            }
        });
        
        msgField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && selectedAgentId) {
                const message = msgField.value.trim();
                if (message && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'message',
                        target: selectedAgentId,
                        message: message
                    }));
                    msgField.value = '';
                    msgInput.classList.remove('visible');
                }
            }
        });
        
        document.getElementById('bubble-task').addEventListener('click', () => {
            if (selectedAgentId) {
                msgInput.classList.add('visible');
                msgField.focus();
            }
        });
        
        // ============ ANIMATION LOOP ============
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();
            
            // Animate all agents
            for (const id in agentGroups) {
                const group = agentGroups[id];
                const userData = group.userData;
                const agent = agents[id];
                
                // Floating animation
                group.position.y = Math.sin(elapsed * 1.2 + userData.floatOffset) * 0.1;
                
                // Gentle swaying
                group.rotation.y = Math.atan2(group.position.x, group.position.z) + Math.PI + Math.sin(elapsed * 0.5 + userData.floatOffset) * 0.05;
                
                // Arm animation based on status
                if (agent && agent.status === 'working') {
                    // Waving arms when working
                    userData.leftArm.rotation.x = Math.sin(elapsed * 3 + userData.walkOffset) * 0.3;
                    userData.rightArm.rotation.x = Math.sin(elapsed * 3 + userData.walkOffset + Math.PI) * 0.3;
                    
                    // Slight leg movement
                    userData.leftLeg.rotation.x = Math.sin(elapsed * 2 + userData.walkOffset) * 0.1;
                    userData.rightLeg.rotation.x = Math.sin(elapsed * 2 + userData.walkOffset + Math.PI) * 0.1;
                } else {
                    // Idle arm position
                    userData.leftArm.rotation.x *= 0.9;
                    userData.rightArm.rotation.x *= 0.9;
                    userData.leftLeg.rotation.x *= 0.9;
                    userData.rightLeg.rotation.x *= 0.9;
                }
                
                // Head bob when thinking
                if (agent && agent.status === 'thinking') {
                    userData.head.rotation.z = Math.sin(elapsed * 4) * 0.1;
                } else {
                    userData.head.rotation.z *= 0.9;
                }
                
                // Screen flicker effect
                if (agent && agent.status === 'working') {
                    userData.screen.material.opacity = 0.6 + Math.sin(elapsed * 10) * 0.2;
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ============ RESIZE HANDLER ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ============ START ============
        connect();
        
        // Demo mode - show agents if bridge not connected
        setTimeout(() => {
            if (Object.keys(agents).length === 0) {
                console.log('Bridge not available, showing demo agents');
                const demoAgents = [
                    { id: 'bit', name: 'Bit', role: 'assistant', agent_type: 'permanent', color: '#4A90D9', status: 'idle', expertise: ['coding', 'general'] },
                    { id: 'architect', name: 'Architect', role: 'system_design', agent_type: 'permanent', color: '#9B59B6', status: 'idle', expertise: ['system_design', 'api_design', 'data_modeling'] },
                    { id: 'ops', name: 'Ops', role: 'operations_reliability', agent_type: 'permanent', color: '#27AE60', status: 'idle', expertise: ['ci_cd', 'kubernetes', 'monitoring'] },
                    { id: 'testing', name: 'Testing', role: 'quality_assurance', agent_type: 'permanent', color: '#E67E22', status: 'idle', expertise: ['test_automation', 'unit_testing', 'e2e_testing'] },
                    { id: 'security', name: 'Security', role: 'security_review', agent_type: 'permanent', color: '#E74C3C', status: 'idle', expertise: ['vulnerability_analysis', 'auth', 'secure_coding'] }
                ];
                for (const agent of demoAgents) {
                    addAgent(agent);
                }
            }
        }, 3000);
    </script>
</body>
</html>
